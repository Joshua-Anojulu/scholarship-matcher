# Blueprint reference for a clean redeploy. The currently live service was
# created manually under a different name (scholarship-matcher-fqr2) and is
# served at scholarships4u.dev, so the names below are not the live resource
# names. Update them here if you recreate the service from this blueprint.
databases:
  - name: scholarships4u-db
    plan: free

services:
  - type: web
    name: scholarships4u
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: scholarships4u-db
          property: connectionString
